services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sauti}
      POSTGRES_USER: ${DB_USER:-sauti}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sauti}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - sauti-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

volumes:
  sauti-postgres:
