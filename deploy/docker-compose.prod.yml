name: sauti

services:
  backend:
    image: sauti-backend:${IMAGE_TAG:-latest}
    build:
      context: ./source
      dockerfile: Dockerfile
    env_file:
      - ${SAUTI_ENV_FILE:-.env.production}
    environment:
      DB_URL: ${DB_URL:?DB_URL is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_FLYWAY_URL: ${SPRING_FLYWAY_URL:?SPRING_FLYWAY_URL is required}
      SPRING_FLYWAY_USER: ${SPRING_FLYWAY_USER:?SPRING_FLYWAY_USER is required}
      SPRING_FLYWAY_PASSWORD: ${SPRING_FLYWAY_PASSWORD:?SPRING_FLYWAY_PASSWORD is required}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST:?SPRING_REDIS_HOST is required}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${SPRING_REDIS_PASSWORD:?SPRING_REDIS_PASSWORD is required}
      SPRING_REDIS_SSL_ENABLED: "${SPRING_REDIS_SSL_ENABLED:-true}"
      DASHBOARD_BASE_URL: https://${SAUTI_DOMAIN:-sauti.uk}
      SAUTI_CORS_ALLOWED_ORIGINS: https://${SAUTI_DOMAIN:-sauti.uk}
      PUBLIC_BASE_URL: https://${SAUTI_DOMAIN:-sauti.uk}
      SAUTI_WEB_VOICE_WEBSOCKET_URL: wss://${SAUTI_DOMAIN:-sauti.uk}
      TELNYX_MEDIA_WEBSOCKET_BASE_URL: wss://${SAUTI_DOMAIN:-sauti.uk}/ws/telnyx/media
      SAUTI_RECORDINGS_DIR: /data/recordings
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx1536m}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    volumes:
      - recordings-data:/data/recordings
    restart: unless-stopped

  dashboard:
    image: sauti-dashboard:${IMAGE_TAG:-latest}
    build:
      context: ./source
      dockerfile: dashboard/Dockerfile
      args:
        SAUTI_API_BASE_URL: http://backend:8080
    environment:
      SAUTI_API_BASE_URL: http://backend:8080
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    environment:
      SAUTI_DOMAIN: ${SAUTI_DOMAIN:-sauti.uk}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - dashboard
    restart: unless-stopped

volumes:
  recordings-data:
  caddy-data:
  caddy-config:
