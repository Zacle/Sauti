name: sauti

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sauti}
      POSTGRES_USER: ${DB_USER:-sauti}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sauti} -d ${POSTGRES_DB:-sauti}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  backend:
    image: sauti-backend:${IMAGE_TAG:-latest}
    build:
      context: ./source
      dockerfile: Dockerfile
    env_file:
      - ${SAUTI_ENV_FILE:-.env.production}
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sauti}
      DB_USER: ${DB_USER:-sauti}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ""
      SPRING_REDIS_SSL_ENABLED: "false"
      DASHBOARD_BASE_URL: https://${SAUTI_DOMAIN:-sauti.uk}
      SAUTI_CORS_ALLOWED_ORIGINS: https://${SAUTI_DOMAIN:-sauti.uk}
      PUBLIC_BASE_URL: https://${SAUTI_DOMAIN:-sauti.uk}
      SAUTI_WEB_VOICE_WEBSOCKET_URL: wss://${SAUTI_DOMAIN:-sauti.uk}
      TELNYX_MEDIA_WEBSOCKET_BASE_URL: wss://${SAUTI_DOMAIN:-sauti.uk}/ws/telnyx/media
      SAUTI_RECORDINGS_DIR: /data/recordings
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx1536m}
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    volumes:
      - recordings-data:/data/recordings
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: sauti-dashboard:${IMAGE_TAG:-latest}
    build:
      context: ./source
      dockerfile: dashboard/Dockerfile
      args:
        SAUTI_API_BASE_URL: http://backend:8080
    environment:
      SAUTI_API_BASE_URL: http://backend:8080
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    environment:
      SAUTI_DOMAIN: ${SAUTI_DOMAIN:-sauti.uk}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - dashboard
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  recordings-data:
  caddy-data:
  caddy-config:
