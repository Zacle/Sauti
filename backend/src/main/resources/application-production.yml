spring:
  h2:
    console:
      enabled: false
  jpa:
    properties:
      hibernate:
        format_sql: false
  thymeleaf:
    cache: true

sauti:
  providers:
    # Existing production installations may predate PROVIDER_MODE. Production
    # must never inherit the development-only `fake` default from application.yml.
    mode: ${PROVIDER_MODE:live}
  auth:
    expose-dev-tokens: false
