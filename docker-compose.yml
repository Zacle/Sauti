name: sauti

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sauti}
      POSTGRES_USER: ${DB_USER:-sauti}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sauti}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sauti} -d ${POSTGRES_DB:-sauti}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.27
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-sauti}
      DB_USER: ${DB_USER:-sauti}
      DB_PASSWORD: ${DB_PASSWORD:-sauti}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ""
      SPRING_REDIS_SSL_ENABLED: "false"
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: 1025
      DASHBOARD_BASE_URL: http://localhost:${DASHBOARD_PORT:-8088}
      SAUTI_CORS_ALLOWED_ORIGINS: http://localhost:${DASHBOARD_PORT:-8088},http://127.0.0.1:${DASHBOARD_PORT:-8088}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
      SAUTI_RECORDINGS_DIR: /data/recordings
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-service-account.json
    ports:
      - "${BACKEND_PORT:-8080}:8080"
      - "${MANAGEMENT_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
    restart: unless-stopped
    volumes:
      - recordings-data:/data/recordings
      - ${FIREBASE_CREDENTIALS_FILE:-./secrets/firebase-service-account.json}:/run/secrets/firebase-service-account.json:ro

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      args:
        SAUTI_API_BASE_URL: http://backend:8080
    environment:
      SAUTI_API_BASE_URL: http://backend:8080
      NODE_ENV: production
    ports:
      - "${DASHBOARD_PORT:-8088}:8088"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  recordings-data:
