name: Deploy production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish-and-deploy:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/zacle/sauti-backend:${{ github.event.workflow_run.head_sha }}
            ghcr.io/zacle/sauti-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and publish dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dashboard/Dockerfile
          push: true
          tags: |
            ghcr.io/zacle/sauti-dashboard:${{ github.event.workflow_run.head_sha }}
            ghcr.io/zacle/sauti-dashboard:latest
          cache-from: type=gha,scope=dashboard
          cache-to: type=gha,mode=max,scope=dashboard

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Copy deployment configuration
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "mkdir -p /opt/sauti"
          scp -i ~/.ssh/deploy_key \
            deploy/Caddyfile \
            deploy/docker-compose.prod.yml \
            deploy/deploy.sh \
            deploy/backup-postgres.sh \
            "$VPS_USER@$VPS_HOST:/opt/sauti/"

      - name: Sign the server in to GHCR
        env:
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          printf '%s' "$GHCR_READ_TOKEN" |
            ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
              "docker login ghcr.io -u zacle --password-stdin"

      - name: Deploy verified images
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "cd /opt/sauti && IMAGE_TAG='$IMAGE_TAG' GHCR_OWNER='zacle' bash ./deploy.sh"
