name: Deploy production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-and-deploy:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Copy deployment configuration
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "mkdir -p /opt/sauti"
          scp -i ~/.ssh/deploy_key \
            deploy/Caddyfile \
            deploy/docker-compose.prod.yml \
            deploy/deploy.sh \
            deploy/bootstrap-server-env.sh \
            deploy/backup-postgres.sh \
            deploy/configure-external-services-env.sh \
            deploy/test-external-services.sh \
            deploy/migrate-postgres-to-neon.sh \
            deploy/update-public-callbacks-env.sh \
            "$VPS_USER@$VPS_HOST:/opt/sauti/"

      - name: Check out the verified source on the server
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "
            if [ ! -d /opt/sauti/source/.git ]; then
              git clone https://github.com/Zacle/Sauti.git /opt/sauti/source
            fi
            git -C /opt/sauti/source fetch --prune origin
            git -C /opt/sauti/source checkout --force '$IMAGE_TAG'
          "

      - name: Sync optional provider secrets
        env:
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          VAPI_API_KEY: ${{ secrets.VAPI_API_KEY }}
          VAPI_PUBLIC_KEY: ${{ secrets.VAPI_PUBLIC_KEY }}
          RETELL_API_KEY: ${{ secrets.RETELL_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          TELNYX_API_KEY: ${{ secrets.TELNYX_API_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          sync_provider_secret() {
            setting="$1"
            value="$2"
            if [ -z "$value" ]; then
              return
            fi

            key_file="$(mktemp)"
            remote_file="/tmp/sauti_${setting}_env"
            chmod 600 "$key_file"
            printf '%s=%s\n' "$setting" "$value" > "$key_file"
            scp -i ~/.ssh/deploy_key "$key_file" "$VPS_USER@$VPS_HOST:$remote_file"
            rm -f "$key_file"
            ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "
              cd /opt/sauti
              touch .env.production
              grep -v '^${setting}=' .env.production > .env.production.tmp || true
              cat '$remote_file' >> .env.production.tmp
              mv .env.production.tmp .env.production
              chmod 600 .env.production
              rm -f '$remote_file'
            "
          }

          sync_provider_secret CARTESIA_API_KEY "$CARTESIA_API_KEY"
          sync_provider_secret VAPI_API_KEY "$VAPI_API_KEY"
          sync_provider_secret VAPI_PUBLIC_KEY "$VAPI_PUBLIC_KEY"
          sync_provider_secret RETELL_API_KEY "$RETELL_API_KEY"
          sync_provider_secret ELEVENLABS_API_KEY "$ELEVENLABS_API_KEY"
          sync_provider_secret TELNYX_API_KEY "$TELNYX_API_KEY"

      - name: Deploy verified images
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "cd /opt/sauti && IMAGE_TAG='$IMAGE_TAG' bash ./deploy.sh"
