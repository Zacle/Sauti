name: Deploy production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-and-deploy:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Copy deployment configuration
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "mkdir -p /opt/sauti"
          scp -i ~/.ssh/deploy_key \
            deploy/Caddyfile \
            deploy/docker-compose.prod.yml \
            deploy/deploy.sh \
            deploy/bootstrap-server-env.sh \
            deploy/backup-postgres.sh \
            "$VPS_USER@$VPS_HOST:/opt/sauti/"

      - name: Check out the verified source on the server
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" "
            if [ ! -d /opt/sauti/source/.git ]; then
              git clone https://github.com/Zacle/Sauti.git /opt/sauti/source
            fi
            git -C /opt/sauti/source fetch --prune origin
            git -C /opt/sauti/source checkout --force '$IMAGE_TAG'
          "

      - name: Deploy verified images
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" \
            "cd /opt/sauti && IMAGE_TAG='$IMAGE_TAG' bash ./deploy.sh"
